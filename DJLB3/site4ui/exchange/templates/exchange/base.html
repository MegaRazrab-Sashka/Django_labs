<!DOCTYPE html>
<html>
<head>
    <title>Система обмена данными</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        .card { margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar { margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'exchange_index' %}">Обмен данными</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'structure_list' %}">Структура</a>
                <a class="nav-link" href="{% url 'data_list' %}">Данные</a>
                <a class="nav-link" href="{% url 'generate_data' %}">Генерация</a>
                <a class="nav-link" href="{% url 'export_data' %}">Экспорт</a>
                <a class="nav-link" href="{% url 'send_to_excel' %}">Отправить в Excel</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
